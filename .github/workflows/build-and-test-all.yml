---
name: 'Build and test everything'

on:
  push:
  pull_request:
  schedule:
    - cron: '0 22 * * 3'

jobs:
  build-auth:
    name: build auth
    runs-on: ubuntu-20.04
    env:
      UBSAN_OPTIONS: 'print_stacktrace=1:halt_on_error=1:suppressions=/home/runner/work/pdns/pdns/build-scripts/UBSan.supp'
      ASAN_OPTIONS: detect_leaks=0
    steps:
      - uses: actions/checkout@v2.3.4
        with:
          fetch-depth: 5
          submodules: recursive
      - run: build-scripts/gh-actions-setup-inv  # this runs apt update+upgrade
      - run: inv install-clang
      - run: inv install-auth-build-deps
      - run: inv ci-autoconf
      - run: inv ci-auth-configure
      - run: inv ci-auth-make
      # FIXME: save ccache here?
      - run: inv ci-auth-install-remotebackend-ruby-deps
      - run: inv ci-auth-run-unit-test
      - run: inv make-install
      - name: Store the binaries
        uses: actions/upload-artifact@v2
        with:
          name: pdns-auth
          path: /opt/pdns-auth

  build-recursor:
    name: build recursor
    runs-on: ubuntu-20.04
    env:
      UBSAN_OPTIONS: 'print_stacktrace=1:halt_on_error=1:suppressions=/home/runner/work/pdns/pdns/build-scripts/UBSan.supp'
      ASAN_OPTIONS: detect_leaks=0
    defaults:
      run:
        working-directory: ./pdns/recursordist/
    steps:
      - uses: actions/checkout@v2.3.4
        with:
          fetch-depth: 5
          submodules: recursive
      - run: ../../build-scripts/gh-actions-setup-inv  # this runs apt update+upgrade
      - run: inv apt-fresh
      - run: inv install-clang
      - run: inv install-rec-build-deps
      - run: inv ci-autoconf
      - run: inv ci-rec-configure
      - run: inv ci-rec-make
      # FIXME: save ccache here?
      - run: inv ci-rec-run-unit-tests
  build-dnsdist:
    name: build dnsdist
    runs-on: ubuntu-20.04
    env:
      UBSAN_OPTIONS: 'print_stacktrace=1:halt_on_error=1:suppressions=/home/runner/work/pdns/pdns/build-scripts/UBSan.supp'
      ASAN_OPTIONS: detect_leaks=0
    defaults:
      run:
        working-directory: ./pdns/dnsdistdist/
    steps:
      - uses: actions/checkout@v2.3.4
        with:
          fetch-depth: 5
          submodules: recursive
      - name: install clang
        run: sudo apt-get update && sudo apt-get --no-install-recommends install clang-11 llvm-11
      - name: install dnsdist build deps
        run: |
          sudo apt-get update && sudo apt-get install -qq -y --no-install-recommends \
            autoconf \
            automake \
            g++ \
            git \
            libboost-all-dev \
            libcap-dev \
            libcdb-dev \
            libedit-dev \
            libfstrm-dev \
            libh2o-evloop-dev \
            liblmdb-dev \
            libluajit-5.1-dev \
            libre2-dev \
            libsnmp-dev \
            libsodium-dev \
            libssl-dev \
            libsystemd-dev \
            libtool \
            make \
            pkg-config \
            ragel \
            systemd \
            python3-venv
      - name: autoconf
        run: BUILDER_VERSION=0.0.0-git1 autoreconf -vfi
      - name: configure
        run: |
            CFLAGS="-O1 -Werror=vla -Werror=shadow -Wformat=2 -Werror=format-security -Werror=string-plus-int" \
            CXXFLAGS="-O1 -Werror=vla -Werror=shadow -Wformat=2 -Werror=format-security -Werror=string-plus-int -Wp,-D_GLIBCXX_ASSERTIONS" \
            ./configure \
              CC='clang-11' \
              CXX='clang++-11' \
              --enable-option-checking=fatal \
              --enable-unit-tests \
              --enable-dnstap \
              --enable-dnscrypt \
              --enable-dns-over-tls \
              --enable-dns-over-https \
              --enable-systemd \
              --prefix=/opt/dnsdist \
              --with-libsodium \
              --with-lua=luajit \
              --with-libcap \
              --with-re2 \
              --enable-asan \
              --enable-ubsan
      - name: show config.log
        if: ${{ failure() }}
        run: cat config.log
      - name: build
        run: make -j4 -k V=1
      # FIXME: save ccache here?
      - name: Run unit tests
        run: make check || (cat test-suite.log; false)
  test-auth-api-gsqlite3:
    needs: build-auth
    runs-on: ubuntu-20.04
    env:
      UBSAN_OPTIONS: 'print_stacktrace=1:halt_on_error=1:suppressions=/home/runner/work/pdns/pdns/build-scripts/UBSan.supp'
      ASAN_OPTIONS: detect_leaks=0
    steps:
      - uses: actions/checkout@v2.3.4
        with:
          fetch-depth: 5
          submodules: recursive
      - name: Fetch the binaries
        uses: actions/download-artifact@v2
        with:
          name: pdns-auth
          path: /opt/pdns-auth
      - name: install clang
        run: sudo apt-get update && sudo apt-get --no-install-recommends install clang-11
      - name: Install test dependencies
        run: |
          apt-get -y -qq install \
            authbind \
            bc \
            bind9utils \
            build-essential libsqlite3-dev libzmq3-dev \
            curl \
            default-jre-headless \
            dnsutils \
            gawk \
            git \
            ldnsutils \
            libnet-dns-perl \
            pdns-recursor \
            socat \
            sqlite3 \
            unbound-host
      - run: sudo chmod +x /opt/pdns-auth/bin/*
      - run: sudo apt-get -y -qq install python3-venv python3-dev default-libmysqlclient-dev libpq-dev
      - run: |
            PDNSSERVER="/opt/pdns-auth/sbin/pdns_server" \
            PDNSUTIL="/opt/pdns-auth/bin/pdnsutil" \
            SDIG="/opt/pdns-auth/bin/sdig" \
            ./runtests authoritative gsqlite3
        working-directory: ./regression-tests.api/
